<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
<title>Live Scores — TrendyinUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&amp;family=Inter:wght@400;600;700;900&amp;family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/tw-config.js"></script>
<link rel="stylesheet" href="/assets/theme.css"/>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container">
<div id="site-header"></div>
<main class="max-w-container-max mx-auto px-gutter py-stack-lg">
<div id="breaking"></div>
<div class="flex items-end justify-between flex-wrap gap-3 mb-stack-lg border-l-4 border-primary pl-4">
<div>
<h1 class="font-headline-lg text-headline-lg text-on-background uppercase tracking-tight">Live Scores</h1>
<p class="text-body-md text-on-surface-variant mt-1">Real-time results and upcoming fixtures from across world football.</p>
</div>
<div class="flex items-center gap-2 text-label-sm text-on-surface-variant">
<span id="ls-updated"></span>
<button id="ls-refresh" class="flex items-center gap-1 px-3 py-2 rounded-full border border-outline-variant hover:text-primary transition-colors"><span class="material-symbols-outlined text-[18px]">refresh</span>Refresh</button>
</div>
</div>

<!-- LIVE NOW -->
<section class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-background mb-stack-md flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-error pulse-dot"></span> Live Now</h2>
<div id="ls-live" class="space-y-gutter"></div>
</section>

<!-- UPCOMING -->
<section class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-background mb-stack-md flex items-center gap-2"><span class="material-symbols-outlined text-primary">schedule</span> Upcoming Games</h2>
<div id="ls-upcoming" class="space-y-3"></div>
</section>

<!-- RESULTS -->
<section class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-background mb-stack-md flex items-center gap-2"><span class="material-symbols-outlined text-on-surface-variant">scoreboard</span> Latest Results</h2>
<div id="ls-results" class="grid grid-cols-1 md:grid-cols-2 gap-gutter"></div>
</section>
</main>
<div id="site-footer"></div>
<div id="site-sidenav"></div>
<script>window.TI_PAGE = { type: 'livescores', active: 'live-scores' };</script>
<script src="/assets/site.js"></script>
</body>
</html>
