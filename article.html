<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
<title>Article — TrendyinUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&amp;family=Inter:wght@400;600;700;900&amp;family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/tw-config.js"></script>
<link rel="stylesheet" href="/assets/theme.css"/>
</head>
<body class="bg-surface-bright text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
<div id="site-header"></div>

<main class="max-w-container-max mx-auto px-gutter py-stack-lg">
<div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">

<!-- Article (wide) -->
<article class="lg:col-span-8 xl:col-span-9 min-w-0">
  <div class="flex flex-wrap items-center gap-3 sm:gap-4 mb-stack-md">
    <span id="a-category" class="bg-primary-container text-on-primary-container px-3 py-1 rounded-full font-label-sm text-xs font-bold uppercase tracking-wider"></span>
    <span id="a-meta" class="font-label-sm text-on-surface-variant text-sm"></span>
    <div class="ml-auto flex gap-2">
      <button onclick="navigator.share ? navigator.share({title:document.title,url:location.href}) : (navigator.clipboard.writeText(location.href), alert('Link copied'))" title="Share" class="p-2 rounded-full border border-outline-variant hover:bg-surface-variant transition-colors text-on-surface"><span class="material-symbols-outlined text-[20px]">share</span></button>
      <button onclick="alert('Saved to your reading list')" title="Save" class="p-2 rounded-full border border-outline-variant hover:bg-surface-variant transition-colors text-on-surface"><span class="material-symbols-outlined text-[20px]">bookmark</span></button>
    </div>
  </div>

  <h1 id="a-title" class="font-headline-xl text-3xl sm:text-4xl lg:text-headline-xl mb-stack-md leading-[1.12] tracking-tight text-on-surface"></h1>

  <figure class="relative w-full aspect-video rounded-xl overflow-hidden mb-stack-lg border border-outline-variant shadow-md">
    <img id="a-image" class="w-full h-full object-cover" alt="" title="" src=""/>
    <figcaption class="absolute bottom-0 left-0 w-full p-stack-md article-gradient"><p id="a-caption" class="font-label-sm text-white/90 italic text-sm"></p></figcaption>
  </figure>

  <div id="a-body" class="article-body font-body-lg text-body-lg text-on-surface space-y-6 max-w-none"></div>
  <div id="a-tags" class="mt-stack-lg pt-stack-md border-t border-outline-variant flex gap-2 flex-wrap"></div>

  <!-- 3 similar articles from the same category -->
  <section class="mt-stack-lg pt-stack-lg border-t border-outline-variant">
    <h2 class="font-headline-lg text-2xl sm:text-headline-lg text-on-surface mb-stack-md">Similar Articles</h2>
    <div id="a-similar" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-gutter"></div>
  </section>
</article>

<!-- Right sidebar: Categories + Latest Articles -->
<aside class="lg:col-span-4 xl:col-span-3 min-w-0 space-y-stack-lg lg:sticky lg:top-24 lg:h-fit">
  <div>
    <h3 class="font-headline-md text-headline-md font-bold mb-stack-md flex items-center gap-2 text-on-surface">Categories<div class="h-px flex-grow bg-outline-variant"></div></h3>
    <ul id="a-categories" class="flex flex-wrap lg:flex-col gap-2"></ul>
  </div>
  <div>
    <h3 class="font-headline-md text-headline-md font-bold mb-stack-md flex items-center gap-2 text-on-surface">Latest Articles<div class="h-px flex-grow bg-outline-variant"></div></h3>
    <div id="a-latest" class="space-y-4"></div>
  </div>
  <div class="bg-surface-container-high p-stack-md rounded-xl border border-primary/20">
    <span class="font-label-sm text-primary font-bold mb-2 block uppercase tracking-tighter">Stay Updated</span>
    <h4 class="font-headline-md text-headline-md text-on-surface mb-3">Sports Daily Digest</h4>
    <p class="font-body-md text-sm text-on-surface-variant mb-4">Get the biggest stories, results and analysis in your inbox.</p>
    <form class="space-y-3" onsubmit="return TI.subscribe(event)"><input required class="w-full bg-card border border-outline-variant rounded-lg px-4 py-2 text-on-surface focus:ring-1 focus:ring-primary" placeholder="Email address" type="email"/><button class="w-full bg-primary-container text-on-primary-container py-3 rounded-lg font-bold font-label-sm hover:brightness-105 transition-all">Sign Up Now</button></form>
  </div>
</aside>

</div>
</main>

<div id="site-footer"></div>
<div id="site-sidenav"></div>
<script>window.TI_PAGE = { type: 'article', active: '' };</script>
<script src="/assets/site.js"></script>
</body>
</html>
